<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Culture | Contact Us</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>Why Culture</h1>
      <p>We would love to hear from you.</p>
    </header>

    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact Us</a>
    </nav>

    <main>
      <section>
        <h2>Contact Information</h2>
        <p>Email: support@whyculture.com</p>
        <p>Phone: +27 12 345 6789</p>
        <p>Address: 25 Culture Street, Johannesburg, South Africa</p>
      </section>
      <section>
        <h2>Send Us a Message</h2>
        <form>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" />
 
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" />
         
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="1" placeholder="Write your message"></textarea>
 
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Why Culture Apparel. All rights reserved.</p>
    </footer>
  </body>
</html>
